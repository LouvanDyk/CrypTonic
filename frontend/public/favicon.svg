<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradient matching CrypTonic's accent colors -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c8aff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ba5ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bgGradient)"/>

  <!-- Lock emoji -->
  <text x="16" y="23" font-size="20" text-anchor="middle" fill="white">🔐</text>
</svg>